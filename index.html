<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PDA: STALZONE TERMINAL</title>
    <style>
        :root {
            --bg: #0d100d;
            --panel: #151a15;
            --border: #3e483e;
            --green: #40a040;
            --amber: #d4a017;
            --red: #cc3333;
            --text: #a8b8a8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.4) 1px, transparent 1px);
            background-size: 100% 4px;
        }

        h1 { color: var(--green); text-align: center; text-transform: uppercase; border-bottom: 2px solid var(--green); padding-bottom: 10px; }

        /* Вкладки */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #000; border: 1px solid var(--green); color: var(--green); padding: 8px 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { background: var(--green); color: #000; }

        /* Новые стили для прибыли */
        .profit-positive { color: var(--green); }
        .profit-negative { color: var(--red); }

        /* Сектор выбора */
        .selector { background: var(--panel); padding: 15px; border: 1px solid var(--border); margin-bottom: 20px; text-align: center; }
        .items-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .item-toggle { border: 1px solid var(--green); padding: 5px 10px; cursor: pointer; color: var(--green); font-size: 0.8rem; }
        .item-toggle.selected { background: var(--green); color: #000; font-weight: bold; }

        /* Карточки */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .item-card { background: var(--panel); border: 1px solid var(--border); padding: 15px; }
        .item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .item-icon { width: 40px; height: 40px; background-size: contain; background-repeat: no-repeat; border: 1px solid var(--border); background-color: #222;}
        input { background: #000; border: 1px solid var(--border); color: var(--amber); padding: 5px; width: 100%; margin-top: 5px; }
        .result { color: var(--amber); font-weight: bold; margin-top: 10px; text-align: right; }

        /* Подвал */
        .total-section { background: var(--panel); border: 1px solid var(--border); padding: 20px; margin-top: 20px; text-align: center; }
        .deal-btn-new { background: var(--amber); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .copy-btn, .clear-btn { background: #000; border: 1px solid var(--green); color: var(--green); padding: 5px 10px; cursor: pointer; margin-left: 5px; }

        /* История */
        .profit-records-list { max-height: 120px; overflow-y: auto; border: 1px solid var(--border); background: #0a0a0a; padding: 5px; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>[PDA SYSTEM]</h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="buy">Покупка</button>

    <!-- ДОБАВЛЕНА КНОПКА, КОТОРОЙ НЕ ХВАТАЛО -->
    <div style="text-align: center; margin-bottom: 10px;">

    </div>

    <div class="selector" id="selector-container" style="display:none;">
        <div class="items-list" id="items-list"></div>
    </div>

    <div class="container" id="buy-container"></div>

    <div id="profit-section" style="display:none;">

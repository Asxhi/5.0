<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STALZONE Calculator</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --card-bg: #12121a;
            --border-glow: rgba(255,255,255,0.1);
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --accent-yellow: #ffeb3b;
            --accent-cyan: #00ffff;
            --accent-red: #ff5722;
        }

        body { background: var(--bg-dark); color: var(--text-primary); font-family: sans-serif; padding: 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        
        /* Стили карточек */
        .item-card { background: var(--card-bg); border: 1px solid var(--border-glow); padding: 15px; border-radius: 10px; }
        .item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .icon { width: 40px; height: 40px; background-size: contain; background-repeat: no-repeat; }
        
        /* Исправление длинного списка */
        .records-list { 
            max-height: 120px; 
            overflow-y: auto; 
            border-top: 1px solid #333; 
            margin-top: 10px; 
            padding-top: 5px;
            font-size: 0.85rem;
            color: #aaa;
        }
        .records-list::-webkit-scrollbar { width: 5px; }
        .records-list::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }

        .btn { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-deal { background: #ff2a6d; color: white; width: 100%; margin-top: 10px; }
        
        .profit-card { border: 1px solid var(--accent-yellow); }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <button class="btn" onclick="switchTab('buy')">Покупка</button>
        <button class="btn" onclick="switchTab('sell')">Продажа</button>
        <button class="btn" onclick="switchTab('profit')">Прибыль</button>
    </div>

    <div id="main-container" class="container"></div>

    <script>
        // НАСТРОЙКИ
        const ICONS_PATH = 'icons/'; // Папка на гитхабе
        const ITEMS = [
            { id: 'dust', name: 'Аномальная пыль', price: 270, icon: 'anomalnaya-pyl.png' },
            { id: 'tool', name: 'Мультитул', price: 5000, icon: 'multitul.png' },
            // Добавляй свои предметы сюда
        ];

        let state = {
            buyHistory: JSON.parse(localStorage.getItem('buyHistory') || '[]'),
            sellHistory: JSON.parse(localStorage.getItem('sellHistory') || '[]')
        };

        function render(mode) {
            const container = document.getElementById('main-container');
            container.innerHTML = '';

            if (mode === 'profit') {
                renderProfit(container);
            } else {
                ITEMS.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div class="item-header">
                            <div class="icon" style="background-image: url('${ICONS_PATH}${item.icon}')"></div>
                            <b>${item.name}</b>
                        </div>
                        <input type="number" id="qty-${item.id}" placeholder="Кол-во" style="width:100%">
                        <input type="number" id="price-${item.id}" value="${item.price}" style="width:100%; margin-top:5px">
                        <button class="btn btn-deal" onclick="addRecord('${item.id}', '${mode}')">Записать ${mode === 'buy' ? 'Покупку' : 'Продажу'}</button>
                    `;
                    container.appendChild(card);
                });
            }
        }

        function addRecord(itemId, mode) {
            const qty = document.getElementById(`qty-${itemId}`).value;
            const price = document.getElementById(`price-${itemId}`).value;
            if(!qty || !price) return;
            
            const record = { id: itemId, qty: parseInt(qty), price: parseInt(price), date: Date.now() };
            if (mode === 'buy') state.buyHistory.push(record);
            else state.sellHistory.push(record);
            
            localStorage.setItem('buyHistory', JSON.stringify(state.buyHistory));
            localStorage.setItem('sellHistory', JSON.stringify(state.sellHistory));
            alert('Записано!');
        }

        function renderProfit(container) {
            ITEMS.forEach(item => {
                const buys = state.buyHistory.filter(r => r.id === item.id);
                const sells = state.sellHistory.filter(r => r.id === item.id);
                
                const card = document.createElement('div');
                card.className = 'item-card profit-card';
                card.innerHTML = `
                    <b>${item.name}</b>
                    <div class="records-list">
                        ${buys.map(r => `<div>Покупка: ${r.qty}x${r.price}</div>`).join('')}
                        ${sells.map(r => `<div>Продажа: ${r.qty}x${r.price}</div>`).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(mode) { render(mode); }
        render('buy'); // Старт
    </script>
</body>
</html>

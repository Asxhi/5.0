<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STALZONE PDA Terminal</title>
    <style>
        :root {
            --bg-color: #0d0f0d;
            --card-bg: #1a1e1a;
            --border-color: #4a5d4a;
            --accent-green: #39ff14;
            --accent-amber: #ffb700;
            --text-color: #c0c0c0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #151a15 0%, #0d0f0d 100%);
        }

        /* Заголовок-терминал */
        .header h1 {
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
            border-bottom: 2px solid var(--accent-green);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Кнопки в стиле ПДА */
        .tab-btn {
            background: #000;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .tab-btn.active {
            background: var(--accent-green);
            color: #000;
        }

        /* Карточки предметов */
        .item-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 0;
            position: relative;
        }
        .item-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--accent-green);
            border-left: 2px solid var(--accent-green);
        }

        input {
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--accent-amber);
            padding: 5px;
            width: 100%;
            margin-top: 5px;
        }

        .deal-btn-new {
            background: var(--accent-amber);
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .profit-records-list {
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #333;
            background: #0a0c0a;
            padding: 5px;
            font-size: 0.8rem;
        }
        
        .profit-records-list::-webkit-scrollbar { width: 4px; }
        .profit-records-list::-webkit-scrollbar-thumb { background: var(--accent-green); }
    </style>
</head>
<body>

    <div class="header" style="text-align:center">
        <h1>[PDA SYSTEM v2.0]</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="buy">Покупка</button>
            <button class="tab-btn" data-tab="sell">Продажа</button>
            <button class="tab-btn" data-tab="profit">Прибыль</button>
        </div>
    </div>

    <div id="main-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px;"></div>

    <script>
        // Список предметов (как в твоем репозитории)

            { id: 'dust', name: 'Аномальная пыль', price: 270, icon: 'anomalnaya-pyl.png' },
            { id: 'tool', name: 'Мультитул', price: 5000, icon: 'multitul.png' },
            { id: 'yeast', name: 'Дрожжи', price: 1500, icon: 'drozhzhi.png' },
            { id: 'fish', name: 'Полутухлая рыба', price: 2000, icon: 'polutukhlaya-ryba.png' }
            // ... остальной список
        ];

    </script>
</body>
</html>
